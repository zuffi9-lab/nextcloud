version: '3.9'
services:
  fn-ofd-reminder:
    build: .
    image: fn-ofd-reminder:latest
    container_name: fn-ofd-reminder
    ports:
      - "8080:8080"
    environment:
      - CONFIG_PATH=/data/config.json
      - PORT=8080
      - RUN_ON_START=true
      - SCHEDULE_CRON=0 8 * * *
      - FLASK_SECRET=change-me
    volumes:
      - ./data:/data
    restart: unless-stopped
